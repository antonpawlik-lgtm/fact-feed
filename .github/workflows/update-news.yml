name: Update news
on:
  schedule:
    - cron: '0 */3 * * *' # every 3 hours
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fetch:news
      # If validation fails, the job stops here and the previously
      # deployed news.json stays live instead of a broken scrape.
      - run: npm run validate:news
      - name: Commit updated news.json
        run: |
          if git diff --quiet news.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Update news.json"
          git push
